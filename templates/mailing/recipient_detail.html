{% extends 'base.html' %}

{% block title %}{{ recipient.full_name }}{% endblock %}

{% block content %}
<h1 class="mb-4">{{ recipient.full_name }}</h1>

<div class="card">
    <div class="card-body">
        <p><strong>Email:</strong> {{ recipient.email }}</p>
        <p><strong>Комментарий:</strong> {{ recipient.comment|linebreaks }}</p>
    </div>
    <div class="card-footer">
        <a href="{% url 'mailing:recipient_update' recipient.pk %}" class="btn btn-warning">Изменить</a>
        <a href="{% url 'mailing:recipient_delete' recipient.pk %}" class="btn btn-danger">Удалить</a>
        <a href="{% url 'mailing:recipient_list' %}" class="btn btn-secondary">Назад к списку</a>
    </div>
</div>
{% endblock %}
