{% extends 'base.html' %}

{% block title %}Удаление получателя{% endblock %}

{% block content %}
<div class="alert alert-danger">
    <h1>Удаление получателя</h1>
    <p>Вы уверены, что хотите удалить получателя "{{ object.full_name }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'mailing:recipient_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
