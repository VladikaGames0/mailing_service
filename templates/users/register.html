{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">Регистрация</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="{{ form.email.id_for_label }}" class="form-label">Email</label>
                        {{ form.email.errors }}
                        <input type="email" name="{{ form.email.name }}" id="{{ form.email.id_for_label }}"
                               class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.password1.id_for_label }}" class="form-label">Пароль</label>
                        {{ form.password1.errors }}
                        <input type="password" name="{{ form.password1.name }}" id="{{ form.password1.id_for_label }}"
                               class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.password2.id_for_label }}" class="form-label">Подтверждение пароля</label>
                        {{ form.password2.errors }}
                        <input type="password" name="{{ form.password2.name }}" id="{{ form.password2.id_for_label }}"
                               class="form-control" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center">
                <p class="mb-0">Уже есть аккаунт? <a href="{% url 'users:login' %}">Войти</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
